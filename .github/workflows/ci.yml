name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - run: npm run validate:skill
      - name: Validate documentation links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude "https://github.com/Peak-Studios/advanced-ai-npc" --exclude-path node_modules --exclude-path dist --exclude-path catalog/scripts --exclude-path skills/peak-scripts/references "./*.md" "./docs/**/*.md" "./skills/peak-scripts/SKILL.md"
          fail: true

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan Git history for secrets
        run: docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest detect --source=/repo --no-banner
